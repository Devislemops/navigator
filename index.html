<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigator — Linux & DevOps Commands</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<header>
  <h1>Navigator</h1>
  <p>Linux & DevOps Command Explorer</p>

  <nav>
    <input type="text" id="searchInput" placeholder="Search command or description...">
    <select id="categoryFilter">
      <option value="All">All Categories</option>
      <option value="Basics">Basics</option>
      <option value="Files">Files & Directories</option>
      <option value="Networking">Networking</option>
      <option value="SSH">SSH & Remote</option>
      <option value="Monitoring">Process & Monitoring</option>
      <option value="Text">Text & Filters</option>
      <option value="Security">Security</option>
      <option value="DevOps">DevOps / Git</option>
      <option value="HPC">HPC / Slurm</option>
    </select>
  </nav>
</header>

<main id="commandsContainer">
  <!-- Command cards will be inserted here dynamically -->
</main>

<script src="script.js"></script>
</body>
</html>
